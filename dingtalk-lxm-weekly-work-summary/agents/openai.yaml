interface:
  display_name: "钉钉周工作总结（mcp）"
  short_description: "汇总lxm一周钉钉工作证据"
  default_prompt: "Use $dingtalk-lxm-weekly-work-summary to summarize lxm's weekly work from DingTalk evidence."
dependencies:
  tools:
    - type: "mcp"
      value: "dingtalk-contacts-mcp"
      description: "Identify DingTalk users and relevant contacts."
    - type: "mcp"
      value: "dingtalk-calendar-mcp"
      description: "Read DingTalk calendar events and participants."
    - type: "mcp"
      value: "dingtalk-ToDo-mcp"
      description: "Read DingTalk todo tasks and details."
    - type: "mcp"
      value: "dingtalk-OAapproval-mcp"
      description: "Read DingTalk OA approval instances and tasks."
    - type: "mcp"
      value: "dingtalk-log-mcp"
      description: "Read DingTalk sent and received logs."
    - type: "mcp"
      value: "dingtalk-doc-mcp"
      description: "Read relevant DingTalk documents when needed."
    - type: "mcp"
      value: "dingtalk-excel-mcp"
      description: "Read relevant DingTalk spreadsheets when needed."
    - type: "mcp"
      value: "dingtalk-AIexcel-mcp"
      description: "Read relevant DingTalk AI tables when needed."
    - type: "mcp"
      value: "dingtalk-groupchat-mcp"
      description: "Use group metadata where available."
    - type: "mcp"
      value: "dingtalk-robotmessage-mcp"
      description: "Search group metadata only; do not send messages by default."
policy:
  allow_implicit_invocation: true
